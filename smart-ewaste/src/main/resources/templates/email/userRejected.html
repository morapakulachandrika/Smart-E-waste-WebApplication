<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Account Registration Rejected</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family: Arial, Helvetica, sans-serif;">

    <!-- Outer Wrapper -->
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px;">
        <tr>
            <td align="center">

                <!-- Email Container -->
                <table width="600" cellpadding="0" cellspacing="0"
                       style="background-color:#ffffff; border-radius:6px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                        <td style="background-color:#c53030; padding:18px 24px;">
                            <h2 style="margin:0; color:#ffffff; font-size:20px; font-weight:600;">
                                Account Registration Rejected
                            </h2>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:24px; color:#333333; font-size:14px; line-height:1.6;">

                            <p style="margin-top:0;">
                                Hi <strong>{{name}}</strong>,
                            </p>

                            <p>
                                We regret to inform you that your registration has been
                                <strong style="color:#c53030;">rejected</strong>.
                            </p>

                            <!-- Info Box -->
                            <table width="100%" cellpadding="0" cellspacing="0"
                                   style="background-color:#fff5f5; border:1px solid #fed7d7; border-radius:4px; margin:16px 0;">
                                <tr>
                                    <td style="padding:12px;">
                                        <p style="margin:0;">
                                            You may re-register using correct and complete details for review.
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <p>
                                Thank you for your interest in <strong>Smart E-Waste</strong>.
                            </p>

                            <p style="margin-top:20px;">
                                Regards,<br>
                                <strong>Smart E-Waste Team</strong>
                            </p>

                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background-color:#edf2f7; padding:12px; text-align:center; font-size:12px; color:#666666;">
                            © 2025 Smart E-Waste. All rights reserved.
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
