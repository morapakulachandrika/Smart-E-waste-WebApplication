<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pickup Status Updated</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, Helvetica, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center" style="padding:30px 15px;">
                
                <table width="100%" max-width="600px" cellpadding="0" cellspacing="0"
                       style="background:#ffffff; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.08);">
                    
                    <!-- Header -->
                    <tr>
                        <td style="background:#2f80ed; padding:20px; border-radius:8px 8px 0 0; text-align:center;">
                            <h2 style="color:#ffffff; margin:0; font-size:22px;">
                                Pickup Status Updated
                            </h2>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding:25px;">
                            <p style="font-size:16px; color:#333333; margin:0 0 15px;">
                                Hello,
                            </p>

                            <p style="font-size:15px; color:#555555; margin:0 0 10px;">
                                Your <strong>E-Waste Pickup request</strong> status has been updated.
                            </p>

                            <table width="100%" cellpadding="0" cellspacing="0" style="margin:20px 0;">
                                <tr>
                                    <td style="padding:10px; background:#f8f9fb; border:1px solid #e0e0e0;">
                                        <strong>Request ID:</strong> {{requestId}}
                                    </td>
                                </tr>
                                <tr>
                                    <td style="padding:10px; background:#f8f9fb; border:1px solid #e0e0e0; border-top:none;">
                                        <strong>New Status:</strong>
                                        <span style="color:#2f80ed; font-weight:bold;">
                                            {{status}}
                                        </span>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size:14px; color:#666666; margin:0;">
                                Thank you for choosing our E-Waste Pickup service 🌱  
                                We appreciate your contribution towards a cleaner environment.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f1f3f6; padding:15px; text-align:center; border-radius:0 0 8px 8px;">
                            <p style="font-size:12px; color:#777777; margin:0;">
                                © 2026 Smart E-Waste Management System
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
