<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Smart E-Waste</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: auto;
      background: #ffffff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .header {
      text-align: center;
      font-size: 24px;
      color: #2e7d32;
      font-weight: bold;
      margin-bottom: 20px;
    }
    .content {
      font-size: 15px;
      color: #333;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #2e7d32;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
      text-align: center;
    }
    .highlight {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">🌱 Smart E-Waste</div>

    <div class="content">
      {{content}}
    </div>

    <div class="footer">
      ♻️ Together for a cleaner and greener planet<br>
      © 2025 Smart E-Waste
    </div>
  </div>
</body>
</html>
